name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Lean / Mathlib
        uses: leanprover/lean-action@v1
      - name: Print axiom dependencies of every theorem
        run: lake env lean Zebrafm/Check.lean
